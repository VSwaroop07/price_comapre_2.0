{% extends 'account.html' %}
{% load static %}
{% block content %}
    <div class="col-md-5 mx-auto">
        <div class="auth-card">
            <h4 class="mb-4 text-center fw-bold" style="color: var(--text-main);">{{ title }}</h4>
            <form action="{% url 'signup' %}" method="post">
                {% csrf_token %}
                <div class="form-group mb-3">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Create username" autocomplete="off">
                </div>
                <div class="form-group mb-3">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Enter email" autocomplete="off">
                </div>
                <div class="form-group mb-3">
                    <label for="mobile">Mobile</label>
                    <input type="number" name="mobile" id="mobile" class="form-control" placeholder="Enter mobile number" autocomplete="off">
                </div>
                <div class="form-group mb-4">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Create password" autocomplete="off">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-semibold" style="border-radius: 8px;">Create Account</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted mb-0">Already have an account? <a href="{% url 'login' %}" style="color: var(--brand-color); text-decoration: none; font-weight: 500;">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
